name: Join Rhizome
description: Add your site to the webring
title: "join: yoursite.com"
labels: ["join"]
body:
    - type: input
      id: name
      attributes:
          label: Site name
          placeholder: "My Site"
      validations:
          required: true

    - type: input
      id: url
      attributes:
          label: URL
          description: Must start with https://
          placeholder: "https://yoursite.com"
      validations:
          required: true

    - type: textarea
      id: bio
      attributes:
          label: Bio
          description: One sentence, 160 chars max
          placeholder: "What your site is about."
      validations:
          required: true

    - type: checkboxes
      id: confirm
      attributes:
          label: Checklist
          options:
              - label: My site is publicly accessible
                required: true
              - label: I have added the Spore embed to my site
                required: true
