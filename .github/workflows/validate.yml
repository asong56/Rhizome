name: Graft — validate node submission

on:
    pull_request:
        paths:
            - 'nodes.json'

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - id: val
              run: node scripts/validate.js

            - name: Backlink check (advisory)
              continue-on-error: true
              run: |
                  node --input-type=module << 'JS'
                  import { readFileSync } from 'fs';
                  const nodes = JSON.parse(readFileSync('nodes.json', 'utf8'))
                      .filter(n => n.status !== 'dormant');
                  await Promise.all(nodes.map(async n => {
                      try {
                          const r    = await fetch(n.url, { signal: AbortSignal.timeout(10000) });
                          const html = await r.text();
                          const ok   = html.includes('spore.js') || html.includes('rhizome-spore');
                          console.log(`  ${ok ? '✓' : '⚠'} ${n.name}: backlink ${ok ? 'found' : 'not found'}`);
                      } catch (e) { console.log(`  ⚠ ${n.name}: ${e.message}`); }
                  }));
                  JS

            - if: always()
              uses: actions/github-script@v7
              with:
                  script: |
                      const ok = '${{ steps.val.outcome }}' === 'success';
                      github.rest.issues.createComment({
                          issue_number: context.issue.number,
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          body: ok
                              ? '🌿 **Grafting approved.** `nodes.json` is valid — node will join on merge.'
                              : '🥀 **Grafting failed.** Schema errors in `nodes.json` — see workflow log.',
                      });
