name: 🌿 Prune — Mark Dormant Nodes

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { token: '${{ secrets.GITHUB_TOKEN }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: node scripts/prune.js
      - name: Commit if changed
        run: |
          git diff --quiet nodes.json && exit 0
          git config user.name "Rhizome Pruner"
          git config user.email "pruner@rhizome.network"
          git add nodes.json
          git commit -m "prune: mark dormant nodes [$(date -u +%Y-%m-%d)]"
          git push
