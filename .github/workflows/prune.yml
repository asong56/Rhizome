name: Prune dormant nodes

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - run: bun run scripts/prune.js

      - run: |
          git diff --quiet nodes.json && exit 0
          git config user.name  "Rhizome Pruner"
          git config user.email "pruner@rhizome.network"
          git add nodes.json
          git commit -m "prune: mark dormant nodes [$(date -u +%Y-%m-%d)]"
          git push
